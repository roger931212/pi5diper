<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待審閱案例</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #eef1f4;
            padding: 24px 20px;
            color: #1f2937;
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
        }

        .header {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #d8dee6;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.06);
            margin-bottom: 20px;
        }

        .case-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #d8dee6;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .case-card:hover {
            border-color: #b9c6d5;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
        }

        .ai-badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .level-0 {
            background: #edf3f8;
            color: #2f5d8a;
            border-color: #ccdae8;
        }

        .level-1 {
            background: #fff4e8;
            color: #9c5f16;
            border-color: #f0d7b5;
        }

        .level-2 {
            background: #fff8db;
            color: #90711a;
            border-color: #e8dca8;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #d8dee6;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .empty-state-mark {
            display: inline-block;
            font-size: 14px;
            font-weight: 700;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid #cfd8e3;
            color: #41556f;
            background: #f4f7fb;
            margin-bottom: 18px;
        }

        .btn-review {
            background: #2f5d8a;
            border: 1px solid #2f5d8a;
            color: white;
        }

        .btn-review:hover {
            background: #264d72;
            border-color: #264d72;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .case-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 10px;
        }

        .case-contact span {
            color: #41556f;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2>待處理案例</h2>
                    <p class="text-muted mb-0">等待醫療審閱的案例</p>
                </div>
                <a href="/" class="btn btn-outline-secondary">← 返回主控台</a>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">載入中...</span>
            </div>
            <p class="mt-3 text-muted">正在載入案例...</p>
        </div>

        <div id="casesList"></div>
    </div>

    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script nonce="{{ request.state.csp_nonce }}">
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function parseBackendDate(value, { assumeUtcWhenNoZone = false } = {}) {
            const raw = String(value ?? "").trim();
            if (!raw) {
                return null;
            }

            let normalized = raw.replace(" ", "T");
            if (/([+-]\d{2})(\d{2})$/.test(normalized)) {
                normalized = normalized.replace(/([+-]\d{2})(\d{2})$/, "$1:$2");
            }
            const hasExplicitZone = /(?:Z|[+-]\d{2}:\d{2})$/i.test(normalized);
            if (!hasExplicitZone && assumeUtcWhenNoZone) {
                normalized = `${normalized}Z`;
            }

            const parsed = new Date(normalized);
            if (Number.isNaN(parsed.getTime())) {
                return null;
            }
            return parsed;
        }

        function formatBackendDate(value, { assumeUtcWhenNoZone = false } = {}) {
            const parsed = parseBackendDate(value, { assumeUtcWhenNoZone });
            if (!parsed) {
                return '未知';
            }
            return parsed.toLocaleString('zh-TW', {
                hour12: false,
                timeZone: 'Asia/Taipei',
            });
        }

        function renderPendingCases(cases) {
            const loading = document.getElementById('loading');
            const casesList = document.getElementById('casesList');

            loading.style.display = 'none';
            const rows = Array.isArray(cases) ? cases : [];

            if (rows.length === 0) {
                casesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-mark">目前無待審閱</div>
                        <h3>無待處理案例</h3>
                        <p class="text-muted">所有案例已審閱完畢。</p>
                        <a href="/" class="btn btn-primary mt-3">返回主控台</a>
                    </div>
                `;
                return;
            }

            let html = '';
            rows.forEach(c => {
                const caseId = String(c.id ?? c.case_id ?? "");
                const caseIdShort = escapeHtml(caseId.substring(0, 8));
                const normalizedLevel = Math.max(0, Math.min(2, Number(c.ai_level ?? 0)));
                const levelClass = `level-${normalizedLevel}`;
                const createdDate = formatBackendDate(c.created_at, { assumeUtcWhenNoZone: true });
                const createdDateEsc = escapeHtml(createdDate);
                const caregiverName = String(c.name ?? "").trim() || "未填寫";
                const caregiverPhone = String(c.phone ?? "").trim() || "未填寫";
                const aiLevelDisplay = c.ai_level !== null && c.ai_level !== undefined
                    ? escapeHtml(c.ai_level)
                    : '處理中';
                const aiProb = Number(c.ai_prob);
                const aiProbHtml = Number.isFinite(aiProb)
                    ? `<span class="ms-2 text-muted"><small>信心度: ${(aiProb * 100).toFixed(1)}%</small></span>`
                    : '';
                const suggestionRaw = String(c.ai_suggestion ?? "");
                const suggestionPreview = suggestionRaw.length > 100
                    ? `${suggestionRaw.substring(0, 100)}...`
                    : suggestionRaw;
                const suggestionHtml = suggestionRaw
                    ? `<p class="mt-2 mb-0"><small><strong>AI:</strong> ${escapeHtml(suggestionPreview)}</small></p>`
                    : '';
                const detailHref = `/review/detail?id=${encodeURIComponent(caseId)}`;

                html += `
                    <div class="case-card">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h5>案例 ${caseIdShort}...</h5>
                                <p class="text-muted mb-2">
                                    <small>${createdDateEsc}</small>
                                </p>
                                <div class="case-contact">
                                    <span><strong>姓名:</strong> ${escapeHtml(caregiverName)}</span>
                                    <span><strong>電話:</strong> ${escapeHtml(caregiverPhone)}</span>
                                </div>
                                <div>
                                    <span class="ai-badge ${levelClass}">
                                        AI 等級: ${aiLevelDisplay}
                                    </span>
                                    ${aiProbHtml}
                                </div>
                                ${suggestionHtml}
                            </div>
                            <div class="col-md-4 text-end">
                                <a href="${detailHref}" class="btn btn-review btn-lg">
                                    審閱案例 →
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });

            casesList.innerHTML = html;
        }

        function showPendingLoadError(message) {
            const loading = document.getElementById('loading');
            const errText = message instanceof Error ? message.message : String(message ?? '未知錯誤');
            loading.style.display = 'block';
            loading.innerHTML = `
                <div class="alert alert-danger">
                    <strong>錯誤:</strong> <span id="pendingLoadErr"></span>
                </div>
            `;
            document.getElementById('pendingLoadErr').textContent = errText;
        }

        window.addEventListener('edge:pending-cases-updated', (event) => {
            const cases = event && event.detail ? event.detail.cases : [];
            renderPendingCases(cases);
        });

        window.addEventListener('edge:pending-cases-error', (event) => {
            const detail = event && event.detail ? event.detail : {};
            showPendingLoadError(detail.message || '載入待處理案例失敗');
        });
    </script>
    {% include "_new_case_notifier.html" %}
</body>

</html>
