<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尿布疹邊緣運算系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #eef1f4;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 36px 20px;
            color: #1f2937;
            font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
        }

        .dashboard-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #d8dee6;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            padding: 50px;
            max-width: 700px;
            width: 100%;
        }

        .system-title {
            text-align: center;
            margin-bottom: 40px;
            color: #243447;
        }

        .system-title h1 {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .action-btn {
            padding: 22px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            border: 1px solid transparent;
            margin-bottom: 20px;
        }

        .btn-primary-custom {
            background: #2f5d8a;
            border-color: #2f5d8a;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #264d72;
            border-color: #264d72;
            color: white;
        }

        .btn-success-custom {
            background: #2e7a63;
            border-color: #2e7a63;
            color: white;
        }

        .btn-success-custom:hover {
            background: #25624f;
            border-color: #25624f;
            color: white;
        }

        .btn-sync {
            background: #6c4f34;
            border-color: #6c4f34;
            color: white;
            padding: 16px;
            font-size: 16px;
        }

        .btn-sync:hover {
            background: #593f29;
            border-color: #593f29;
            color: white;
        }

        .status-badge {
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            background: #edf3f8;
            color: #2f5d8a;
            border: 1px solid #ccdae8;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div class="dashboard-card">
        <div class="system-title">
            <h1>尿布疹邊緣運算系統</h1>
            <p class="text-muted">醫療專業人員介面</p>
            <span class="status-badge">系統已上線</span>
        </div>

        <div class="d-grid gap-3">
            <a href="/review" class="btn action-btn btn-primary-custom">
                審閱待處理案例
            </a>

            <a href="/reviewed" class="btn action-btn btn-success-custom">
                檢視歷史紀錄
            </a>

            <button id="triggerSyncBtn" type="button" class="btn action-btn btn-sync">
                手動強制同步
            </button>
        </div>

        <div class="text-center mt-4">
            <small class="text-muted">邊緣處理系統 v1.0 | 樹莓派</small>
        </div>
    </div>

    <!-- Toast for sync status -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="syncToast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">同步狀態</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                同步已成功觸發!
            </div>
        </div>
    </div>

    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script nonce="{{ request.state.csp_nonce }}">
        async function triggerSync() {
            try {
                const response = await fetch('/api/sync/trigger', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                const toastEl = document.getElementById('syncToast');
                const toastBody = document.getElementById('toastMessage');

                if (response.ok) {
                    toastBody.textContent = (data.message || '同步已成功觸發!');
                    toastBody.className = 'toast-body bg-success text-white';
                } else {
                    toastBody.textContent = (data.detail || '同步失敗');
                    toastBody.className = 'toast-body bg-danger text-white';
                }

                const toast = new bootstrap.Toast(toastEl);
                toast.show();
            } catch (error) {
                const toastEl = document.getElementById('syncToast');
                const toastBody = document.getElementById('toastMessage');
                toastBody.textContent = '錯誤: ' + error.message;
                toastBody.className = 'toast-body bg-danger text-white';
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
            }
        }

        const triggerSyncBtn = document.getElementById('triggerSyncBtn');
        if (triggerSyncBtn) {
            triggerSyncBtn.addEventListener('click', triggerSync);
        }
    </script>
    {% include "_new_case_notifier.html" %}
</body>

</html>
